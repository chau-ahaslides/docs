name: Lint KB links

# Enforces the repo convention that KB-to-KB links are relative <article>.md,
# never an absolute docs.ahaslides.com URL or a github/gitbook .md source URL.
# See scripts/lint-kb-links.sh for the full rule and rationale.

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint-kb-links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run KB link lint
        run: ./scripts/lint-kb-links.sh
